name: Daily Stock Scraper

on:
  schedule:
    # Her gün Türkiye saati ile gece 03:00'te (UTC 00:00) çalışır
    - cron: '0 0 * * *'
  workflow_dispatch: # İstediğimiz zaman GitHub üzerinden el ile tetikleyebilmek için

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dosyaları depoya geri yazabilmesi için izin veriyoruz
      
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install yfinance

    - name: Scraper Scriptini Çalıştır
      run: python scrape.py

    - name: Değişiklikleri Depoya Yükle
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add data/*.json
        # Sadece değişiklik varsa commit et, yoksa hata verme
        git diff-index --quiet HEAD || git commit -m "Günlük hisse geçmişi güncellendi (Otomatik)"
        git push
